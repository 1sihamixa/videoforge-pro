<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b0b1a"/>
      <stop offset="50%" style="stop-color:#13132e"/>
      <stop offset="100%" style="stop-color:#1a1a3a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="100%" style="stop-color:#e63946"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="200" cy="150" r="120" fill="#6c5ce7" opacity="0.08"/>
  <circle cx="1000" cy="450" r="180" fill="#e63946" opacity="0.06"/>
  <circle cx="600" cy="315" r="250" fill="#00c853" opacity="0.03"/>
  <!-- Brand text -->
  <text x="600" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="64" font-weight="900" fill="url(#glow)">VideoForge Pro</text>
  <text x="600" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#e0e0f0">Wav2Lip AI Talking Avatar Generator</text>
  <text x="600" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#8888aa">Turn any photo into a talking video</text>
  <!-- Arrow/play icon -->
  <polygon points="580,400 620,430 580,460" fill="#6c5ce7"/>
  <text x="640" y="445" font-family="Arial, sans-serif" font-size="18" fill="#00c853">FREE</text>
  <!-- Bottom text -->
  <text x="600" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#555">videoforge-pro.com</text>
  <text x="600" y="570" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#444">أداة مجانية لإنشاء فيديوهات ناطقة بالذكاء الاصطناعي</text>
</svg>
