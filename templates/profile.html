{% extends 'base.html' %}
{% block title %}الملف الشخصي{% endblock %}
{% block content %}
<section class="page-header">
    <div class="container">
        <h1>الملف الشخصي</h1>
    </div>
</section>

<section class="profile-section section">
    <div class="container">
        <div class="profile-card">
            <div class="profile-avatar">
                <i class="fas fa-user-circle"></i>
                <h2>{{ current_user.username }}</h2>
                <span class="member-since">عضو منذ {{ current_user.created_at.strftime('%Y-%m-%d') }}</span>
            </div>
            <form method="POST" action="{{ url_for('update_profile') }}" class="profile-form">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label>اسم المستخدم</label>
                    <input type="text" value="{{ current_user.username }}" readonly>
                </div>
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" name="email" value="{{ current_user.email }}" required>
                </div>
                <div class="form-group">
                    <label>رقم الجوال</label>
                    <input type="text" name="phone" value="{{ current_user.phone or '' }}">
                </div>
                <div class="form-group">
                    <label>كلمة المرور الجديدة (اتركها فارغة إذا لا تريد التغيير)</label>
                    <input type="password" name="password" placeholder="أدخل كلمة المرور الجديدة">
                </div>
                <button type="submit" class="btn btn-primary">حفظ التغييرات</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
