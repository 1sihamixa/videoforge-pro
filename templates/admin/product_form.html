{% extends 'admin/layout.html' %}
{% block title %}{% if product %}تعديل{% else %}إضافة{% endif %} منتج{% endblock %}
{% block content %}
<h2>{% if product %}تعديل{% else %}إضافة{% endif %} منتج</h2>
<form method="POST" enctype="multipart/form-data" class="admin-form">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
    <div class="form-row">
        <div class="form-group">
            <label>اسم المنتج (عربي) <span class="required">*</span></label>
            <input type="text" name="name_ar" value="{{ product.name_ar if product else '' }}" required>
        </div>
        <div class="form-group">
            <label>اسم المنتج (إنجليزي)</label>
            <input type="text" name="name" value="{{ product.name if product else '' }}">
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label>السعر <span class="required">*</span></label>
            <input type="number" name="price" step="0.01" value="{{ product.price if product else '' }}" required>
        </div>
        <div class="form-group">
            <label>السعر قبل الخصم</label>
            <input type="number" name="compare_price" step="0.01" value="{{ product.compare_price if product else '' }}">
        </div>
        <div class="form-group">
            <label>المخزون</label>
            <input type="number" name="stock" value="{{ product.stock if product else '0' }}">
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label>التصنيف <span class="required">*</span></label>
            <select name="category_id" required>
                {% for cat in categories %}
                <option value="{{ cat.id }}" {% if product and product.category_id == cat.id %}selected{% endif %}>{{ cat.name_ar or cat.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>الحجم</label>
            <select name="volume">
                <option value="30ml" {% if product and product.volume == '30ml' %}selected{% endif %}>30 مل</option>
                <option value="50ml" {% if product and product.volume == '50ml' %}selected{% endif %}>50 مل</option>
                <option value="75ml" {% if product and product.volume == '75ml' %}selected{% endif %}>75 مل</option>
                <option value="100ml" {% if product and product.volume == '100ml' %}selected{% endif %}>100 مل</option>
                <option value="150ml" {% if product and product.volume == '150ml' %}selected{% endif %}>150 مل</option>
            </select>
        </div>
        <div class="form-group">
            <label>الجنس</label>
            <select name="gender">
                <option value="unisex" {% if product and product.gender == 'unisex' %}selected{% endif %}>للجنسين</option>
                <option value="male" {% if product and product.gender == 'male' %}selected{% endif %}>رجالي</option>
                <option value="female" {% if product and product.gender == 'female' %}selected{% endif %}>نسائي</option>
            </select>
        </div>
    </div>
    <div class="form-group">
        <label>الوصف (عربي)</label>
        <textarea name="description_ar" rows="3">{{ product.description_ar if product else '' }}</textarea>
    </div>
    <div class="form-group">
        <label>الوصف (إنجليزي)</label>
        <textarea name="description" rows="3">{{ product.description if product else '' }}</textarea>
    </div>
    <div class="form-group">
        <label><input type="checkbox" name="is_featured" {% if product and product.is_featured %}checked{% endif %}> منتج مميز</label>
    </div>
    <div class="form-group">
        <label>الصورة</label>
        <input type="file" name="image" accept="image/*">
        {% if product and product.image %}
        <p class="current-image"><img src="{{ url_for('static', filename='img/products/' + product.image) }}" class="admin-product-img"></p>
        {% endif %}
    </div>
    <button type="submit" class="btn btn-primary">{% if product %}تحديث{% else %}إضافة{% endif %}</button>
    <a href="{{ url_for('admin_products') }}" class="btn btn-outline">إلغاء</a>
</form>
{% endblock %}
